<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>cfm Quote Tool</title>
<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff}
.wrap{max-width:1200px;margin:auto;padding:24px}.card{background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:24px}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.logo{height:84px;max-width:480px}.printLogo{display:none}
.info{color:#fff;text-align:right;line-height:1.35;font-size:16px;font-weight:600}
input{width:100%;padding:10px;border-radius:12px;border:1px solid #334155;background:#020617;color:#fff;box-sizing:border-box;}
input[type="date"]{width:auto;padding:8px;font-family:Arial;color-scheme:dark;cursor:pointer;}
button{background:#2563eb;color:#fff;border:0;padding:12px 16px;border-radius:12px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:12px}th,td{padding:8px;border-bottom:1px solid #334155}.right{text-align:right}
@media print{
body{background:#fff;color:#000}.noPrint{display:none !important}.card{background:#fff;border:none;padding:0}
input{border:none;background:#fff;color:#000;padding:0}table,th,td{border:1px solid #000}
.screenLogo{display:none}.printLogo{display:block}.logo{height:72px}.info{color:#000}
input[type="date"]{color-scheme:light;}
@page{margin:.45in}
}
</style>
<script>
function addRow(){let tb=document.getElementById('tb');let r=tb.insertRow();r.innerHTML='<td></td><td contenteditable=true>Item</td><td><input type=number value=1 onchange=calc()></td><td><input type=number value=0 onchange=calc()></td><td class=right>$0.00</td>';calc();}
function calc(){let t=0;[...document.querySelectorAll('#tb tr')].forEach((r,i)=>{r.cells[0].innerText=i+1;let q=+r.cells[2].children[0].value||0;let p=+r.cells[3].children[0].value||0;let a=q*p;r.cells[4].innerText='$'+a.toFixed(2);t+=a;});document.getElementById('tot').innerText='$'+t.toFixed(2);}

// New function to initialize the date and quote number
function initDefaults() {
    const today = new Date();
    
    // Format date as YYYY-MM-DD for the input picker
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('quoteDate').value = `${yyyy}-${mm}-${dd}`;
    
    // Generate quote number starting with 0001
    document.getElementById('quoteNum').innerText = `QT-${yyyy}-0001`;
}

window.onload=()=>{ initDefaults(); addRow(); };
</script></head>
<body><div class="wrap"><div class="card">
<div class="top">
<div>
<img src="logo-white.png" class="logo screenLogo">
<img src="logo-black.png" class="logo printLogo">
</div>
<div class="info">
<div>cfm Distributors Inc - Iowa</div>
<div>4137 109th Street</div>
<div>Urbandale, IA 50322</div>
<div class="noPrint" style="margin-top:12px"><button onclick="window.print()">Download PDF</button></div>
</div>
</div><hr>
<div class="top" style="align-items: center; margin-bottom: 16px;">
<div><strong>Quote #</strong> <span id="quoteNum"></span></div>
<div><strong>Date</strong> <input type="date" id="quoteDate"></div>
</div>
<label>Customer Name</label><input style="max-width:420px; margin-top:8px;">
<table><thead><tr><th>#</th><th>Description</th><th>Qty</th><th>Price</th><th class="right">Amount</th></tr></thead><tbody id="tb"></tbody></table>
<div class="noPrint" style="margin-top:10px"><button onclick="addRow()">Add Line Item</button></div>
<div class="right" style="font-size:30px;font-weight:bold;margin-top:16px">Total: <span id="tot">$0.00</span></div>
</div></div></body></html>
